services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-connected}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connected}
      POSTGRES_DB: ${POSTGRES_DB:-connected}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
