<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Breed SVG Designs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A0F3E;
      font-family: sans-serif;
      padding: 40px 20px;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 2px;
    }
    p.subtitle {
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 40px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 760px;
      margin: 0 auto;
    }
    .cat-card {
      background: #2D1B5E;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .cat-card svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <h1>Cat Breed Collection</h1>
  <p class="subtitle">10 flat minimalist SVG illustrations</p>
  <div class="grid">
