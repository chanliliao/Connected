<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <!-- Envelope rotated 45° to form a rhombus/diamond shape -->
  <g transform="translate(45, 45) rotate(45) translate(-30, -20)">
    <!-- Envelope body -->
    <rect x="0" y="0" width="60" height="40" rx="3" fill="#2d1224" stroke="#fb7185" stroke-width="1.2" opacity="0.95"/>

    <!-- Inner flap shadow -->
    <polygon points="0,0 30,18 60,0" fill="#3d1a30" opacity="0.9"/>

    <!-- Top flap (triangle) -->
    <polygon points="0,0 30,22 60,0" fill="none" stroke="#fb7185" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Bottom flap hint -->
    <polygon points="0,40 30,24 60,40" fill="#3d1a30" opacity="0.5"/>

    <!-- Seal circle (like a wax seal) -->
    <circle cx="30" cy="22" r="5.5" fill="#E8607A" opacity="0.85"/>

    <!-- Heart on seal -->
    <path d="M30,24.5 C30,24.5 27,21.5 27,20.2 C27,19.2 28,18.5 29,19 C29.5,19.3 30,19.8 30,19.8 C30,19.8 30.5,19.3 31,19 C32,18.5 33,19.2 33,20.2 C33,21.5 30,24.5 30,24.5Z" fill="#2d1224" opacity="0.7"/>

    <!-- Decorative dashed line across body -->
    <line x1="6" y1="32" x2="54" y2="32" stroke="#fb7185" stroke-dasharray="3,2" stroke-width="0.8" opacity="0.35"/>
    <line x1="10" y1="36" x2="50" y2="36" stroke="#fb7185" stroke-dasharray="3,2" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>
