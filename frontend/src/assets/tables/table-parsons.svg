<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Top surface: steep angle -->
  <polygon points="24,6 96,6 118,62 2,62" fill="#d8a4b4"/>
  <!-- Front face of thick slab -->
  <rect x="2" y="62" width="116" height="10" rx="2" fill="#c07888"/>
  <!-- Left thick block leg (short) -->
  <rect x="2" y="72" width="24" height="30" rx="2" fill="#7a6d88"/>
  <!-- Right thick block leg (short) -->
  <rect x="94" y="72" width="24" height="30" rx="2" fill="#7a6d88"/>
  <!-- Shadow insets -->
  <rect x="23" y="72" width="4" height="30" rx="1" fill="#8a506a"/>
  <rect x="94" y="72" width="4" height="30" rx="1" fill="#8a506a"/>
  <!-- Apron between legs -->
  <rect x="26" y="72" width="68" height="10" rx="1" fill="#a3647a"/>
</svg>
