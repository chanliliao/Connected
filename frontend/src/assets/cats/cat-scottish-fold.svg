<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail -->
  <ellipse cx="84" cy="148" rx="45" ry="13" fill="#9E9E9E" transform="rotate(-14 84 148)"/>
  <ellipse cx="60" cy="155" rx="21" ry="10" fill="#8A8A8A" transform="rotate(20 60 155)"/>
  <!-- Body -->
  <ellipse cx="154" cy="145" rx="74" ry="43" fill="#9E9E9E"/>
  <!-- Head -->
  <circle cx="210" cy="105" r="38" fill="#9E9E9E"/>
  <!-- Folded ears (flat, low on head) -->
  <ellipse cx="192" cy="78" rx="14" ry="6" fill="#8A8A8A" transform="rotate(10 192 78)"/>
  <ellipse cx="228" cy="78" rx="14" ry="6" fill="#8A8A8A" transform="rotate(-10 228 78)"/>
  <!-- Folded ear detail (the fold) -->
  <ellipse cx="192" cy="80" rx="10" ry="4" fill="#767676" transform="rotate(10 192 80)"/>
  <ellipse cx="228" cy="80" rx="10" ry="4" fill="#767676" transform="rotate(-10 228 80)"/>
  <!-- Eyes (large, round - scottish fold trait) -->
  <circle cx="199" cy="104" r="9" fill="#DAA520"/>
  <circle cx="221" cy="104" r="9" fill="#DAA520"/>
  <circle cx="200" cy="104" r="4.5" fill="#0A0A00"/>
  <circle cx="222" cy="104" r="4.5" fill="#0A0A00"/>
  <circle cx="201" cy="103" r="1.5" fill="white"/>
  <circle cx="223" cy="103" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="210" cy="115" r="2.5" fill="#C87070"/>
  <!-- Muzzle -->
  <ellipse cx="210" cy="115" rx="10" ry="7" fill="#8A8A8A"/>
  <circle cx="210" cy="115" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="173" y1="114" x2="199" y2="116" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
  <line x1="173" y1="118" x2="199" y2="118" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
  <line x1="221" y1="116" x2="247" y2="114" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
  <line x1="221" y1="118" x2="247" y2="118" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Scottish Fold</text>
</svg>
