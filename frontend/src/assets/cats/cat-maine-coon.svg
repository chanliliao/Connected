<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Thick fluffy tail -->
  <ellipse cx="82" cy="145" rx="50" ry="18" fill="#8B5E3C" transform="rotate(-12 82 145)"/>
  <ellipse cx="58" cy="153" rx="24" ry="14" fill="#7A5230" transform="rotate(18 58 153)"/>
  <!-- Body (large) -->
  <ellipse cx="155" cy="143" rx="78" ry="44" fill="#8B5E3C"/>
  <!-- Head -->
  <circle cx="212" cy="102" r="37" fill="#8B5E3C"/>
  <!-- Tufted ears (large pointed) -->
  <polygon points="194,72 184,48 208,68" fill="#8B5E3C"/>
  <polygon points="230,72 240,48 216,68" fill="#8B5E3C"/>
  <!-- Ear tufts -->
  <polygon points="194,70 186,52 206,68" fill="#7A5230"/>
  <polygon points="230,70 238,52 214,68" fill="#7A5230"/>
  <!-- Ear tuft tips -->
  <line x1="186" y1="50" x2="184" y2="44" stroke="#5C3D20" stroke-width="2"/>
  <line x1="238" y1="50" x2="240" y2="44" stroke="#5C3D20" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="200" cy="100" r="8" fill="#4CAF50"/>
  <circle cx="222" cy="100" r="8" fill="#4CAF50"/>
  <circle cx="201" cy="100" r="4" fill="#0A1A0A"/>
  <circle cx="223" cy="100" r="4" fill="#0A1A0A"/>
  <circle cx="202" cy="99" r="1.5" fill="white"/>
  <circle cx="224" cy="99" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="211" cy="112" r="2.5" fill="#C87070"/>
  <!-- Muzzle area -->
  <ellipse cx="211" cy="112" rx="11" ry="8" fill="#7A5230"/>
  <circle cx="211" cy="113" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="174" y1="111" x2="200" y2="113" stroke="#D4B090" stroke-width="1" opacity="0.7"/>
  <line x1="174" y1="115" x2="200" y2="115" stroke="#D4B090" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="113" x2="248" y2="111" stroke="#D4B090" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="115" x2="248" y2="115" stroke="#D4B090" stroke-width="1" opacity="0.7"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Maine Coon</text>
</svg>
