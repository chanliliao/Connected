<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail (behind body) -->
  <ellipse cx="85" cy="148" rx="45" ry="14" fill="#F5E6C8" transform="rotate(-15 85 148)"/>
  <ellipse cx="60" cy="155" rx="20" ry="10" fill="#F5E6C8" transform="rotate(20 60 155)"/>
  <!-- Body -->
  <ellipse cx="155" cy="145" rx="75" ry="42" fill="#F5E6C8"/>
  <!-- Head -->
  <circle cx="210" cy="105" r="38" fill="#F5E6C8"/>
  <!-- Ears (very small rounded) -->
  <ellipse cx="196" cy="72" rx="10" ry="8" fill="#F5E6C8"/>
  <ellipse cx="224" cy="72" rx="10" ry="8" fill="#F5E6C8"/>
  <ellipse cx="196" cy="74" rx="6" ry="5" fill="#E8D0AA"/>
  <ellipse cx="224" cy="74" rx="6" ry="5" fill="#E8D0AA"/>
  <!-- Eyes -->
  <circle cx="200" cy="102" r="8" fill="#D4860B"/>
  <circle cx="220" cy="102" r="8" fill="#D4860B"/>
  <circle cx="202" cy="101" r="4" fill="#1A0A00"/>
  <circle cx="222" cy="101" r="4" fill="#1A0A00"/>
  <circle cx="203" cy="100" r="1.5" fill="white"/>
  <circle cx="223" cy="100" r="1.5" fill="white"/>
  <!-- Flat face / squished nose area -->
  <ellipse cx="210" cy="113" rx="12" ry="7" fill="#EDCFA0"/>
  <!-- Nose -->
  <circle cx="210" cy="113" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="172" y1="112" x2="198" y2="114" stroke="#C8B89A" stroke-width="1" opacity="0.7"/>
  <line x1="172" y1="116" x2="198" y2="116" stroke="#C8B89A" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="114" x2="248" y2="112" stroke="#C8B89A" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="116" x2="248" y2="116" stroke="#C8B89A" stroke-width="1" opacity="0.7"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Persian</text>
</svg>
