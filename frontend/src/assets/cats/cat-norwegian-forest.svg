<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Extra-thick fluffy tail -->
  <ellipse cx="80" cy="145" rx="52" ry="20" fill="#D0D0D0" transform="rotate(-12 80 145)"/>
  <ellipse cx="55" cy="153" rx="26" ry="16" fill="#B8B8B8" transform="rotate(18 55 153)"/>
  <!-- Body (large fluffy) -->
  <ellipse cx="153" cy="143" rx="79" ry="46" fill="#D0D0D0"/>
  <!-- Head -->
  <circle cx="210" cy="103" r="37" fill="#D0D0D0"/>
  <!-- Large tufted ears -->
  <polygon points="192,73 181,50 207,70" fill="#D0D0D0"/>
  <polygon points="228,73 239,50 213,70" fill="#D0D0D0"/>
  <polygon points="192,71 183,54 205,70" fill="#B8B8B8"/>
  <polygon points="228,71 237,54 215,70" fill="#B8B8B8"/>
  <!-- Ear tufts (longer) -->
  <line x1="183" y1="52" x2="180" y2="44" stroke="#909090" stroke-width="2"/>
  <line x1="187" y1="50" x2="185" y2="42" stroke="#909090" stroke-width="2"/>
  <line x1="237" y1="52" x2="240" y2="44" stroke="#909090" stroke-width="2"/>
  <line x1="233" y1="50" x2="235" y2="42" stroke="#909090" stroke-width="2"/>
  <!-- Ruff/mane around neck -->
  <ellipse cx="210" cy="125" rx="38" ry="14" fill="#E8E8E8"/>
  <!-- Eyes -->
  <circle cx="199" cy="101" r="8" fill="#4CAF50"/>
  <circle cx="221" cy="101" r="8" fill="#4CAF50"/>
  <circle cx="200" cy="101" r="4" fill="#0A1A0A"/>
  <circle cx="222" cy="101" r="4" fill="#0A1A0A"/>
  <circle cx="201" cy="100" r="1.5" fill="white"/>
  <circle cx="223" cy="100" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="210" cy="113" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="173" y1="112" x2="199" y2="114" stroke="#E0E0E0" stroke-width="1" opacity="0.8"/>
  <line x1="173" y1="116" x2="199" y2="116" stroke="#E0E0E0" stroke-width="1" opacity="0.8"/>
  <line x1="221" y1="114" x2="247" y2="112" stroke="#E0E0E0" stroke-width="1" opacity="0.8"/>
  <line x1="221" y1="116" x2="247" y2="116" stroke="#E0E0E0" stroke-width="1" opacity="0.8"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Norwegian Forest</text>
</svg>
