<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail -->
  <ellipse cx="84" cy="147" rx="46" ry="13" fill="#C4742A" transform="rotate(-14 84 147)"/>
  <ellipse cx="60" cy="154" rx="21" ry="10" fill="#A35E20" transform="rotate(20 60 154)"/>
  <!-- Body (athletic, slightly longer) -->
  <ellipse cx="155" cy="144" rx="76" ry="39" fill="#C4742A"/>
  <!-- Bengal spots on body -->
  <ellipse cx="130" cy="135" rx="9" ry="6" fill="#8B4510" opacity="0.7"/>
  <ellipse cx="155" cy="128" rx="8" ry="5" fill="#8B4510" opacity="0.7"/>
  <ellipse cx="178" cy="135" rx="9" ry="6" fill="#8B4510" opacity="0.7"/>
  <ellipse cx="142" cy="150" rx="7" ry="5" fill="#8B4510" opacity="0.6"/>
  <ellipse cx="168" cy="150" rx="7" ry="5" fill="#8B4510" opacity="0.6"/>
  <!-- Head -->
  <circle cx="212" cy="104" r="35" fill="#C4742A"/>
  <!-- Ears (large pointed) -->
  <polygon points="196,75 186,54 210,71" fill="#C4742A"/>
  <polygon points="228,75 238,54 214,71" fill="#C4742A"/>
  <polygon points="196,73 188,57 208,71" fill="#A35E20"/>
  <polygon points="228,73 236,57 216,71" fill="#A35E20"/>
  <!-- Head markings -->
  <ellipse cx="200" cy="90" rx="4" ry="6" fill="#8B4510" opacity="0.5"/>
  <ellipse cx="224" cy="90" rx="4" ry="6" fill="#8B4510" opacity="0.5"/>
  <!-- Eyes -->
  <circle cx="200" cy="102" r="8" fill="#DAA520"/>
  <circle cx="222" cy="102" r="8" fill="#DAA520"/>
  <circle cx="201" cy="102" r="4" fill="#0A0A00"/>
  <circle cx="223" cy="102" r="4" fill="#0A0A00"/>
  <circle cx="202" cy="101" r="1.5" fill="white"/>
  <circle cx="224" cy="101" r="1.5" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="211" cy="113" rx="10" ry="7" fill="#A35E20"/>
  <!-- Nose -->
  <circle cx="211" cy="113" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="174" y1="112" x2="201" y2="114" stroke="#E8C090" stroke-width="1" opacity="0.7"/>
  <line x1="174" y1="116" x2="201" y2="116" stroke="#E8C090" stroke-width="1" opacity="0.7"/>
  <line x1="221" y1="114" x2="248" y2="112" stroke="#E8C090" stroke-width="1" opacity="0.7"/>
  <line x1="221" y1="116" x2="248" y2="116" stroke="#E8C090" stroke-width="1" opacity="0.7"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Bengal</text>
</svg>
