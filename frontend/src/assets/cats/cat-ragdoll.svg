<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail (fluffy, color-pointed) -->
  <ellipse cx="83" cy="146" rx="48" ry="16" fill="#F0E6D3" transform="rotate(-13 83 146)"/>
  <ellipse cx="58" cy="154" rx="23" ry="12" fill="#6B4A3E" transform="rotate(20 58 154)"/>
  <!-- Body (large fluffy) -->
  <ellipse cx="154" cy="143" rx="78" ry="46" fill="#F0E6D3"/>
  <!-- Head -->
  <circle cx="211" cy="103" r="38" fill="#F0E6D3"/>
  <!-- Color-pointed face mask (subtle) -->
  <ellipse cx="211" cy="113" rx="20" ry="15" fill="#D4C0A8"/>
  <!-- Ears -->
  <polygon points="194,74 184,54 208,71" fill="#F0E6D3"/>
  <polygon points="228,74 238,54 214,71" fill="#F0E6D3"/>
  <!-- Point color on ears -->
  <polygon points="194,72 186,57 206,71" fill="#6B4A3E"/>
  <polygon points="228,72 236,57 216,71" fill="#6B4A3E"/>
  <!-- Eyes (bright blue) -->
  <circle cx="200" cy="102" r="8.5" fill="#5BB8F5"/>
  <circle cx="222" cy="102" r="8.5" fill="#5BB8F5"/>
  <circle cx="201" cy="102" r="4" fill="#0A1A2A"/>
  <circle cx="223" cy="102" r="4" fill="#0A1A2A"/>
  <circle cx="202" cy="101" r="1.5" fill="white"/>
  <circle cx="224" cy="101" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="211" cy="115" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="174" y1="114" x2="200" y2="116" stroke="#E0D0C0" stroke-width="1" opacity="0.7"/>
  <line x1="174" y1="118" x2="200" y2="118" stroke="#E0D0C0" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="116" x2="248" y2="114" stroke="#E0D0C0" stroke-width="1" opacity="0.7"/>
  <line x1="222" y1="118" x2="248" y2="118" stroke="#E0D0C0" stroke-width="1" opacity="0.7"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Ragdoll</text>
</svg>
