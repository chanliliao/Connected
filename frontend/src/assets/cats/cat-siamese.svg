<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail (behind body, dark point) -->
  <ellipse cx="85" cy="148" rx="45" ry="13" fill="#E8D5B0" transform="rotate(-15 85 148)"/>
  <ellipse cx="60" cy="155" rx="20" ry="9" fill="#3D2314" transform="rotate(20 60 155)"/>
  <!-- Body -->
  <ellipse cx="155" cy="145" rx="72" ry="40" fill="#E8D5B0"/>
  <!-- Head -->
  <circle cx="210" cy="105" r="36" fill="#E8D5B0"/>
  <!-- Dark face mask -->
  <ellipse cx="210" cy="112" rx="22" ry="18" fill="#3D2314"/>
  <!-- Ears (tall triangular) -->
  <polygon points="192,75 184,58 204,70" fill="#E8D5B0"/>
  <polygon points="228,75 236,58 216,70" fill="#E8D5B0"/>
  <!-- Dark ear fill -->
  <polygon points="192,73 186,61 202,70" fill="#3D2314"/>
  <polygon points="228,73 234,61 218,70" fill="#3D2314"/>
  <!-- Eyes -->
  <circle cx="200" cy="105" r="8" fill="#5BB8F5"/>
  <circle cx="220" cy="105" r="8" fill="#5BB8F5"/>
  <circle cx="201" cy="105" r="4" fill="#0A1A2A"/>
  <circle cx="221" cy="105" r="4" fill="#0A1A2A"/>
  <circle cx="202" cy="104" r="1.5" fill="white"/>
  <circle cx="222" cy="104" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="210" cy="117" r="2.5" fill="#C87070"/>
  <!-- Whiskers -->
  <line x1="172" y1="116" x2="197" y2="118" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
  <line x1="172" y1="120" x2="197" y2="120" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
  <line x1="223" y1="118" x2="248" y2="116" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
  <line x1="223" y1="120" x2="248" y2="120" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Siamese</text>
</svg>
