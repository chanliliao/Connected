<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#2D1B5E"/>
  <!-- Tail (thin, hairless) -->
  <ellipse cx="86" cy="149" rx="42" ry="9" fill="#D4A574" transform="rotate(-14 86 149)"/>
  <ellipse cx="62" cy="155" rx="18" ry="7" fill="#C09060" transform="rotate(20 62 155)"/>
  <!-- Body -->
  <ellipse cx="154" cy="145" rx="73" ry="40" fill="#D4A574"/>
  <!-- Body wrinkle lines -->
  <line x1="130" y1="130" x2="135" y2="160" stroke="#C09060" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="125" x2="155" y2="155" stroke="#C09060" stroke-width="1.5" opacity="0.5"/>
  <!-- Head (triangle-ish) -->
  <ellipse cx="211" cy="104" rx="34" ry="32" fill="#D4A574"/>
  <!-- Large bat-like ears -->
  <polygon points="190,78 172,50 202,72" fill="#D4A574"/>
  <polygon points="232,78 250,50 218,72" fill="#D4A574"/>
  <!-- Ear inner detail -->
  <polygon points="190,76 175,54 200,72" fill="#C09060"/>
  <polygon points="232,76 247,54 220,72" fill="#C09060"/>
  <!-- Face wrinkles -->
  <line x1="200" y1="90" x2="198" y2="100" stroke="#C09060" stroke-width="1" opacity="0.6"/>
  <line x1="222" y1="90" x2="224" y2="100" stroke="#C09060" stroke-width="1" opacity="0.6"/>
  <line x1="204" y1="88" x2="202" y2="98" stroke="#C09060" stroke-width="1" opacity="0.4"/>
  <!-- Eyes (large, lemony-green) -->
  <ellipse cx="199" cy="103" rx="9" ry="8" fill="#4CAF50"/>
  <ellipse cx="223" cy="103" rx="9" ry="8" fill="#4CAF50"/>
  <circle cx="200" cy="103" r="4.5" fill="#0A1A0A"/>
  <circle cx="224" cy="103" r="4.5" fill="#0A1A0A"/>
  <circle cx="201" cy="102" r="1.5" fill="white"/>
  <circle cx="225" cy="102" r="1.5" fill="white"/>
  <!-- Prominent cheekbones -->
  <ellipse cx="186" cy="112" rx="10" ry="7" fill="#C09060" opacity="0.5"/>
  <ellipse cx="236" cy="112" rx="10" ry="7" fill="#C09060" opacity="0.5"/>
  <!-- Nose (prominent) -->
  <ellipse cx="211" cy="114" rx="4" ry="3" fill="#B07850"/>
  <!-- Whisker pads (no whiskers - sphynx) -->
  <ellipse cx="198" cy="117" rx="7" ry="5" fill="#C09060" opacity="0.4"/>
  <ellipse cx="224" cy="117" rx="7" ry="5" fill="#C09060" opacity="0.4"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" opacity="0.8">Sphynx</text>
</svg>
