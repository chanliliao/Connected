<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- Wingback 2: tall back with wide side wings at top, 3D back/seat separation -->
  <!-- Main back frame -->
  <rect x="30" y="10" width="60" height="76" rx="6" fill="#a3647a"/>
  <!-- Wide wings at top (left and right) -->
  <rect x="10" y="10" width="28" height="38" rx="6" fill="#a3647a"/>
  <rect x="82" y="10" width="28" height="38" rx="6" fill="#a3647a"/>
  <!-- Arms (connecting wings down to seat level) -->
  <rect x="16" y="46" width="18" height="34" rx="5" fill="#c07888"/>
  <rect x="86" y="46" width="18" height="34" rx="5" fill="#c07888"/>
  <!-- Back cushion (inset in main back) -->
  <rect x="34" y="14" width="52" height="60" rx="4" fill="#d8a4b4"/>
  <!-- Shadow strip — 3D depth cue -->
  <rect x="34" y="68" width="52" height="6" rx="1" fill="#8a506a"/>
  <!-- Seat cushion (wider than back, extends past arms) -->
  <rect x="12" y="72" width="96" height="22" rx="8" fill="#d8a4b4"/>
  <!-- Front apron -->
  <rect x="16" y="91" width="88" height="6" rx="3" fill="#a3647a"/>
  <!-- Legs -->
  <rect x="26" y="95" width="10" height="30" rx="4" fill="#7a6d88"/>
  <rect x="84" y="95" width="10" height="30" rx="4" fill="#7a6d88"/>
</svg>
