<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- French Provincial: oval medallion back, curved cabriole legs -->
  <!-- Wood frame oval (darker) -->
  <ellipse cx="60" cy="36" rx="30" ry="32" fill="#a3647a"/>
  <!-- Back cushion inset -->
  <ellipse cx="60" cy="36" rx="22" ry="24" fill="#d8a4b4"/>
  <!-- Arms (graceful curves) -->
  <rect x="12" y="62" width="16" height="12" rx="6" fill="#c07888"/>
  <rect x="92" y="62" width="16" height="12" rx="6" fill="#c07888"/>
  <!-- Seat cushion -->
  <rect x="14" y="64" width="92" height="22" rx="8" fill="#d8a4b4"/>
  <!-- Ornate apron (curved bottom edge) -->
  <path d="M22,84 Q60,78 98,84 L96,92 Q60,98 24,92 Z" fill="#a3647a"/>
  <!-- Cabriole legs (S-curve: out then back in) -->
  <path d="M28,90 Q18,102 24,114 Q28,124 20,134" fill="none" stroke="#7a6d88" stroke-width="7" stroke-linecap="round"/>
  <path d="M92,90 Q102,102 96,114 Q92,124 100,134" fill="none" stroke="#7a6d88" stroke-width="7" stroke-linecap="round"/>
</svg>
