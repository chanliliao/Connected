<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- Club chair: very low wide boxy seat, small round arm caps, 3D back/seat separation -->
  <!-- Outer boxy body -->
  <rect x="8" y="30" width="104" height="62" rx="8" fill="#a3647a"/>
  <!-- Boxy arms (side columns) -->
  <rect x="8" y="30" width="22" height="52" rx="6" fill="#c07888"/>
  <rect x="90" y="30" width="22" height="52" rx="6" fill="#c07888"/>
  <!-- Small round arm caps at top -->
  <ellipse cx="19" cy="34" rx="12" ry="8" fill="#c07888"/>
  <ellipse cx="101" cy="34" rx="12" ry="8" fill="#c07888"/>
  <!-- Back cushion (inset between arms) -->
  <rect x="26" y="34" width="68" height="38" rx="5" fill="#d8a4b4"/>
  <!-- Shadow strip — 3D depth cue -->
  <rect x="26" y="66" width="68" height="6" rx="1" fill="#8a506a"/>
  <!-- Seat cushion (very wide, low, sits in front of back) -->
  <rect x="10" y="70" width="100" height="22" rx="7" fill="#d8a4b4"/>
  <!-- Front apron -->
  <rect x="10" y="89" width="100" height="5" rx="3" fill="#a3647a"/>
  <!-- Short legs -->
  <rect x="22" y="92" width="14" height="18" rx="5" fill="#7a6d88"/>
  <rect x="84" y="92" width="14" height="18" rx="5" fill="#7a6d88"/>
</svg>
